name: Office Gate E2E Tests

on:
  workflow_dispatch:
    inputs:
      test_module:
        description: 'Test module to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - checkin
          - guest
          - report
          - edgecase
  schedule:
    - cron: '0 */6 * * *'
  push:
    branches: [ main ]
    paths:
      - 'tests/**'
      - 'playwright.config.ts'

jobs:
  run-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build login-state.json from secrets
        run: |
          python3 -c "
          import json
          state = {
            'cookies': [
              {
                'name': '__Host-next-auth.csrf-token',
                'value': '${{ secrets.CSRF_TOKEN }}',
                'domain': 'office-gate.balinexus.com',
                'path': '/',
                'expires': -1,
                'httpOnly': True,
                'secure': True,
                'sameSite': 'Lax'
              },
              {
                'name': '__Secure-next-auth.callback-url',
                'value': '${{ secrets.CALLBACK_URL }}',
                'domain': 'office-gate.balinexus.com',
                'path': '/',
                'expires': -1,
                'httpOnly': True,
                'secure': True,
                'sameSite': 'Lax'
              },
              {
                'name': '__Secure-next-auth.session-token',
                'value': '${{ secrets.SESSION_TOKEN }}',
                'domain': 'office-gate.balinexus.com',
                'path': '/',
                'expires': -1,
                'httpOnly': True,
                'secure': True,
                'sameSite': 'Lax'
              }
            ],
            'origins': []
          }
          with open('login-state.json', 'w') as f:
            json.dump(state, f)
          "

      - name: Run checkin tests
        if: ${{ github.event.inputs.test_module == 'all' || github.event.inputs.test_module == 'checkin' || github.event_name != 'workflow_dispatch' }}
        run: npx playwright test tests/checkin --project=chromium

      - name: Run guest tests
        if: ${{ github.event.inputs.test_module == 'all' || github.event.inputs.test_module == 'guest' || github.event_name != 'workflow_dispatch' }}
        run: npx playwright test tests/guest --project=chromium

      - name: Run report tests
        if: ${{ github.event.inputs.test_module == 'all' || github.event.inputs.test_module == 'report' || github.event_name != 'workflow_dispatch' }}
        run: npx playwright test tests/report --project=chromium

      - name: Run edgecase tests
        if: ${{ github.event.inputs.test_module == 'all' || github.event.inputs.test_module == 'edgecase' || github.event_name != 'workflow_dispatch' }}
        run: npx playwright test tests/edgecase --project=chromium

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14